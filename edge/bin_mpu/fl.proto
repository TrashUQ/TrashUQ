syntax = "proto3";

package federated;

service FederatedLearningService {
  rpc Join (JoinRequest) returns (JoinResponse);
  rpc GetGlobalModel (GetGlobalModelRequest) returns (GetGlobalModelResponse);
  rpc SubmitUpdate (SubmitUpdateRequest) returns (SubmitUpdateResponse);
}

message JoinRequest {
  string client_id = 1;
}

message JoinResponse {
  bool ok = 1;
  string message = 2;
  uint32 round = 3;
  uint64 model_version = 4;
  repeated float global_weights = 5;
}

message GetGlobalModelRequest {
  string client_id = 1;
}

message GetGlobalModelResponse {
  bool ok = 1;
  string message = 2;
  uint32 round = 3;
  uint64 model_version = 4;
  repeated float global_weights = 5;
}

message SubmitUpdateRequest {
  string client_id = 1;
  uint32 round = 2;
  uint32 num_samples = 3;
  repeated float local_weights = 4;
  float local_loss = 5;
  float local_accuracy = 6;
}

message SubmitUpdateResponse {
  bool ok = 1;
  string message = 2;
  bool round_aggregated = 3;
  uint32 current_round = 4;
  uint64 model_version = 5;
}
